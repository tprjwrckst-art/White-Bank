version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: whitebank
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whitebank
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: on-failure
    env_file:
      - .env
    ports:
      - '4000:4000'
    depends_on:
      - db

volumes:
  db_data:
